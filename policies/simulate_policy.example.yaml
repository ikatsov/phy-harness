# Minimal config for ``scripts/simulate_policy.py``.
# Run: python scripts/simulate_policy.py --config policies/simulate_policy.example.yaml

version: 1
base_dir: ..

# Main task name. Policy path defaults to policies/impl/<task>/<task>.py.
task: inspection

# Number of control steps to run.
steps: 650

# Optional: set output directory (defaults to artifacts/<task>).
# run_dir: artifacts/box_pick

# Optional VLM transcript after rollout.
analyzers:
  - type: vlm_video_transcriber
    enabled: false
    params:
      every_n_frames: 25
      max_frames: 120

# Advanced options (uncomment only if needed):
# policy_symbol: policy
# include_rgb_observation: false
# joint_log_every_steps: 1
# video: null
# video_tile_height: 360
# video_tile_width: 426
# video_output_fps: null
# disable_kinematic_overlays: false
